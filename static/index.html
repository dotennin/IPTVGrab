<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>M3U8 Downloader</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <link
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    rel="stylesheet"
  />
  <link href="/styles.css?v=10" rel="stylesheet" />
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar navbar-dark border-bottom px-4 py-2" id="navbar">
    <span class="navbar-brand mb-0 h1">
      <i class="fas fa-film me-2 text-primary"></i>M3U8 Downloader
    </span>
    <div class="d-flex align-items-center gap-3">
      <span class="text-muted small">HLS Video Downloader</span>
      <button
        class="btn btn-sm btn-outline-secondary d-none"
        id="logoutBtn"
        type="button"
        title="Sign out"
      >
        <i class="fas fa-sign-out-alt me-1"></i>Sign out
      </button>
    </div>
  </nav>

  <div class="container-fluid py-4 px-4">
    <div class="row g-4">
      <!-- ── Left panel: Input ── -->
      <div class="col-xl-6">
        <div class="card h-100">
          <div class="card-header">
            <ul class="nav nav-tabs card-header-tabs" id="inputTabs" role="tablist">
              <li class="nav-item" role="presentation">
                <button
                  class="nav-link active"
                  id="url-tab"
                  data-bs-toggle="tab"
                  data-bs-target="#urlPane"
                  type="button"
                  role="tab"
                >
                  <i class="fas fa-link me-1"></i>URL
                </button>
              </li>
              <li class="nav-item" role="presentation">
                <button
                  class="nav-link"
                  id="curl-tab"
                  data-bs-toggle="tab"
                  data-bs-target="#curlPane"
                  type="button"
                  role="tab"
                >
                  <i class="fas fa-terminal me-1"></i>cURL
                </button>
              </li>
              <li class="nav-item" role="presentation">
                <button
                  class="nav-link"
                  id="batch-tab"
                  data-bs-toggle="tab"
                  data-bs-target="#batchPane"
                  type="button"
                  role="tab"
                >
                  <i class="fas fa-list me-1"></i>Batch
                </button>
              </li>
            </ul>
          </div>
          <div class="card-body">
            <div class="tab-content">
              <!-- URL tab -->
              <div class="tab-pane fade show active" id="urlPane" role="tabpanel">
                <div class="mb-3">
                  <label class="form-label text-muted small">M3U8 URL</label>
                  <input
                    type="url"
                    class="form-control font-mono"
                    id="urlInput"
                    placeholder="https://example.com/stream.m3u8?token=..."
                    spellcheck="false"
                  />
                </div>
                <label class="form-label text-muted small">Custom Headers</label>
                <div id="headersList"></div>
                <button
                  class="btn btn-sm btn-outline-secondary mt-2"
                  id="addHeaderBtn"
                  type="button"
                >
                  <i class="fas fa-plus me-1"></i>Add Header
                </button>
              </div>
              <!-- cURL tab -->
              <div class="tab-pane fade" id="curlPane" role="tabpanel">
                <label class="form-label text-muted small">Paste cURL command copied from browser DevTools</label>
                <textarea
                  class="form-control font-mono"
                  id="curlInput"
                  rows="9"
                  placeholder="curl 'https://example.com/stream.m3u8' \&#10;  -H 'user-agent: Mozilla/5.0 ...' \&#10;  -H 'referer: https://...' \&#10;  ..."
                  spellcheck="false"
                ></textarea>
              </div>
              <!-- Batch tab -->
              <div class="tab-pane fade" id="batchPane" role="tabpanel">
                <label class="form-label text-muted small">
                  Batch URLs — add <code>#name</code> before a URL to set its output filename
                </label>
                <textarea
                  class="form-control font-mono"
                  id="batchInput"
                  rows="7"
                  placeholder="#Episode 1&#10;https://example.com/ep1/index.m3u8&#10;#Episode 2&#10;https://example.com/ep2/index.m3u8&#10;https://example.com/ep3/index.m3u8"
                  spellcheck="false"
                ></textarea>
                <div id="batchHint" class="form-text text-muted mt-1"></div>
                <div class="row g-2 align-items-end mt-2">
                  <div class="col-sm-5">
                    <label class="form-label text-muted small">Quality</label>
                    <select class="form-select form-select-sm bg-dark text-light border-secondary" id="batchQuality">
                      <option value="best" selected>Best quality</option>
                      <option value="worst">Worst quality</option>
                    </select>
                  </div>
                  <div class="col-sm-7">
                    <label class="form-label text-muted small">
                      Parallel tasks: <span id="batchConcurrencyVal">3</span>
                    </label>
                    <input type="range" class="form-range" id="batchConcurrency" min="1" max="10" value="3" />
                  </div>
                </div>
                <div class="mt-3">
                  <button class="btn btn-primary" id="batchStartBtn" type="button">
                    <i class="fas fa-play me-1"></i>Start batch
                  </button>
                </div>
              </div>
            </div>

            <hr class="my-3" />

            <!-- Output settings (hidden when batch tab is active) -->
            <div class="row g-3 align-items-end" id="outputSettingsRow">
              <div class="col-sm-7">
                <label class="form-label text-muted small">Output filename (optional)</label>
                <div class="input-group">
                  <input
                    type="text"
                    class="form-control"
                    id="outputName"
                    placeholder="video_output"
                  />
                  <span class="input-group-text">.mp4</span>
                </div>
              </div>
              <div class="col-sm-5">
                <label class="form-label text-muted small">
                  Concurrency: <span id="concurrencyVal">8</span>
                </label>
                <input
                  type="range"
                  class="form-range"
                  id="concurrency"
                  min="1"
                  max="32"
                  value="8"
                />
              </div>
            </div>

            <div class="mt-3 d-flex gap-2" id="parseBtnGroup">
              <button class="btn btn-primary" id="parseBtn" type="button">
                <i class="fas fa-search me-1"></i>Parse stream
              </button>
              <button
                class="btn btn-outline-secondary d-none"
                id="clearInfoBtn"
                type="button"
              >
                <i class="fas fa-times me-1"></i>Clear
              </button>
            </div>
          </div>
        </div>
      </div>

      <!-- ── Right panel: Stream info ── -->
      <div class="col-xl-6">
        <div class="card h-100" id="streamInfoCard">
          <div class="card-header d-flex align-items-center justify-content-between">
            <span><i class="fas fa-info-circle me-2"></i>Stream info</span>
            <span id="streamTypeBadge"></span>
          </div>
          <div class="card-body" id="streamInfoBody">
            <div class="text-center text-muted py-5" id="streamPlaceholder">
              <i class="fas fa-play-circle fa-3x mb-3 d-block opacity-25"></i>
              <p class="mb-0">Stream info will appear here after parsing</p>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- ── Downloads section ── -->
    <div class="row mt-4">
      <div class="col-12">
        <div class="card">
          <div
            class="card-header d-flex justify-content-between align-items-center"
          >
            <span>
              <i class="fas fa-download me-2"></i>Downloads
              <span class="badge bg-secondary ms-1" id="taskCountBadge">0</span>
            </span>
            <button
              class="btn btn-sm btn-outline-danger"
              id="clearCompletedBtn"
              type="button"
            >
              <i class="fas fa-trash me-1"></i>Clear completed
            </button>
          </div>
          <div class="card-body p-3" id="downloadsList">
            <div class="text-center text-muted py-4" id="tasksPlaceholder">
              <i class="fas fa-inbox fa-2x mb-2 d-block opacity-25"></i>
              <p class="mb-0 small">No tasks yet</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Restart recording confirm modal -->
  <div class="modal fade" id="confirmRestartRecordingModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-sm modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header py-2">
          <h6 class="modal-title mb-0">
            <i class="fas fa-exclamation-triangle me-2 text-warning"></i>Restart recording?
          </h6>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body small text-muted">
          All recorded segments will be <strong class="text-danger">deleted</strong> and recording will start fresh from now.
        </div>
        <div class="modal-footer py-2">
          <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancel</button>
          <button type="button" class="btn btn-warning btn-sm" id="confirmRestartRecordingBtn">
            <i class="fas fa-redo me-1"></i>Restart
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Preview modal -->
  <div class="modal fade" id="previewModal" tabindex="-1" aria-hidden="true">    <div class="modal-dialog modal-xl modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header py-2">
          <h6 class="modal-title mb-0">
            <i class="fas fa-play-circle me-2 text-primary"></i>Preview
          </h6>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body p-0 bg-black">
          <video id="previewVideo" controls style="width:100%;max-height:72vh;display:block"></video>
        </div>
        <div class="modal-footer py-2">
          <small class="text-muted">Preview downloaded segments · Playback stops when modal closes</small>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast container -->
  <div
    class="toast-container position-fixed bottom-0 end-0 p-3"
    id="toastContainer"
  ></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1/dist/hls.min.js"></script>
  <script src="/app.js?v=10"></script>
</body>
</html>
