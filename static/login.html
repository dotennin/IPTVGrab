<!DOCTYPE html>
<html lang="zh-CN" data-bs-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>登录 — M3U8 Downloader</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <link
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    rel="stylesheet"
  />
  <style>
    body {
      background-color: #0d1117;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      width: 100%;
      max-width: 380px;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 2rem;
    }
    .login-logo {
      font-size: 2rem;
      color: #58a6ff;
    }
  </style>
</head>
<body>
  <div class="login-card shadow-lg">
    <div class="text-center mb-4">
      <div class="login-logo mb-2">
        <i class="fas fa-film"></i>
      </div>
      <h5 class="fw-semibold mb-0">M3U8 Downloader</h5>
      <p class="text-muted small mt-1">请输入访问密码</p>
    </div>

    <div id="errorAlert" class="alert alert-danger py-2 small d-none" role="alert">
      <i class="fas fa-exclamation-circle me-1"></i>
      <span id="errorMsg">密码错误，请重试</span>
    </div>

    <form id="loginForm" autocomplete="off">
      <div class="mb-3">
        <label class="form-label text-muted small" for="passwordInput">密码</label>
        <input
          type="password"
          class="form-control"
          id="passwordInput"
          placeholder="输入访问密码"
          autofocus
          required
        />
      </div>
      <button type="submit" class="btn btn-primary w-100" id="loginBtn">
        <span id="loginBtnText"><i class="fas fa-sign-in-alt me-1"></i>登录</span>
        <span id="loginBtnSpinner" class="d-none">
          <span class="spinner-border spinner-border-sm me-1" role="status"></span>验证中…
        </span>
      </button>
    </form>
  </div>

  <script>
    const form = document.getElementById("loginForm");
    const btn = document.getElementById("loginBtn");
    const btnText = document.getElementById("loginBtnText");
    const btnSpinner = document.getElementById("loginBtnSpinner");
    const errorAlert = document.getElementById("errorAlert");
    const errorMsg = document.getElementById("errorMsg");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const password = document.getElementById("passwordInput").value;

      btn.disabled = true;
      btnText.classList.add("d-none");
      btnSpinner.classList.remove("d-none");
      errorAlert.classList.add("d-none");

      try {
        const res = await fetch("/api/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ password }),
        });
        if (res.ok) {
          window.location.replace("/");
        } else {
          const data = await res.json().catch(() => ({}));
          errorMsg.textContent = data.detail || "密码错误，请重试";
          errorAlert.classList.remove("d-none");
        }
      } catch {
        errorMsg.textContent = "网络错误，请稍后重试";
        errorAlert.classList.remove("d-none");
      } finally {
        btn.disabled = false;
        btnText.classList.remove("d-none");
        btnSpinner.classList.add("d-none");
      }
    });
  </script>
</body>
</html>
