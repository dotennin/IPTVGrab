<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Media Nest</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'gh-bg':         '#0d1117',
            'gh-surface':    '#161b22',
            'gh-border':     '#30363d',
            'gh-text':       '#e6edf3',
            'gh-muted':      '#8b949e',
            'gh-blue':       '#388bfd',
            'gh-blue-light': '#58a6ff',
          }
        }
      }
    }
  </script>
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <meta name="theme-color" content="#0b1220" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet" />
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .form-control {
      display: block; width: 100%;
      padding: 0.5rem 0.75rem;
      background-color: #0d1117;
      border: 1px solid #30363d; border-radius: 6px;
      color: #e6edf3; outline: none; font-size: 0.9rem;
    }
    .form-control:focus { border-color: #388bfd; box-shadow: 0 0 0 3px rgba(56,139,253,0.2); }
    .form-control::placeholder { color: #484f58; }
  </style>
</head>
<body class="bg-gh-bg text-gh-text min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-sm bg-gh-surface border border-gh-border rounded-xl p-8 shadow-2xl">
    <div class="text-center mb-6">
      <div class="text-4xl text-gh-blue-light mb-2"><i class="fas fa-satellite-dish"></i></div>
      <h5 class="font-semibold text-lg mb-0">Media Nest</h5>
      <p class="text-gh-muted text-sm mt-1">Enter your access password</p>
    </div>

    <div id="errorAlert" class="hidden mb-3 p-2 rounded text-sm bg-red-900/30 border border-red-500/40 text-red-400" role="alert">
      <i class="fas fa-exclamation-circle mr-1"></i>
      <span id="errorMsg">Incorrect password, please try again</span>
    </div>
    <div id="lockAlert" class="hidden mb-3 p-2 rounded text-sm bg-yellow-900/30 border border-yellow-500/40 text-yellow-400" role="alert">
      <i class="fas fa-lock mr-1"></i>
      This IP is locked. Try again in <strong id="lockCountdown">--</strong> seconds
    </div>

    <form id="loginForm" autocomplete="off">
      <div class="mb-4">
        <label class="block text-gh-muted text-sm mb-1" for="passwordInput">Password</label>
        <input type="password" class="form-control" id="passwordInput" placeholder="Enter access password" autofocus required />
      </div>
      <button type="submit" class="w-full py-2 bg-gh-blue hover:bg-blue-500 text-white rounded font-medium transition-colors" id="loginBtn">
        <span id="loginBtnText"><i class="fas fa-sign-in-alt mr-1"></i>Sign in</span>
        <span id="loginBtnSpinner" class="hidden">
          <span class="inline-block w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin mr-1 align-middle"></span>Verifying…
        </span>
      </button>
    </form>
  </div>

  <script>
    const form = document.getElementById("loginForm");
    const btn = document.getElementById("loginBtn");
    const btnText = document.getElementById("loginBtnText");
    const btnSpinner = document.getElementById("loginBtnSpinner");
    const errorAlert = document.getElementById("errorAlert");
    const errorMsg = document.getElementById("errorMsg");
    const lockAlert = document.getElementById("lockAlert");
    const lockCountdown = document.getElementById("lockCountdown");
    let countdownTimer = null;

    function show(el) { el.classList.remove("hidden"); }
    function hide(el) { el.classList.add("hidden"); }

    function startLockCountdown(seconds) {
      show(lockAlert); hide(errorAlert);
      form.querySelector("input").disabled = true;
      btn.disabled = true;
      let remaining = seconds;
      lockCountdown.textContent = remaining;
      clearInterval(countdownTimer);
      countdownTimer = setInterval(() => {
        remaining -= 1;
        lockCountdown.textContent = remaining;
        if (remaining <= 0) {
          clearInterval(countdownTimer);
          hide(lockAlert);
          form.querySelector("input").disabled = false;
          btn.disabled = false;
          form.querySelector("input").focus();
        }
      }, 1000);
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const password = document.getElementById("passwordInput").value;
      btn.disabled = true;
      hide(btnText); show(btnSpinner);
      hide(errorAlert);
      try {
        const res = await fetch("/api/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ password }),
        });
        if (res.ok) {
          window.location.replace("/");
        } else if (res.status === 429) {
          const data = await res.json().catch(() => ({}));
          const match = (data.detail || "").match(/(\d+)\s*second/);
          const secs = match ? parseInt(match[1]) : 300;
          startLockCountdown(secs);
        } else {
          const data = await res.json().catch(() => ({}));
          errorMsg.textContent = data.detail || "Incorrect password, please try again";
          show(errorAlert);
        }
      } catch {
        errorMsg.textContent = "Network error, please try again";
        show(errorAlert);
      } finally {
        if (!lockAlert.classList.contains("hidden") === false) {
          btn.disabled = false;
        }
        show(btnText); hide(btnSpinner);
      }
    });
  </script>
</body>
</html>
